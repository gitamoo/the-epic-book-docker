version: '3.8'

services:
  # 1. The Database (Stateful Layer)
  db:
    image: mysql:5.7
    container_name: epicbook-db
    restart: always
    environment:
      # These variables pull values from your private .env file
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
      # Automates database seeding from your local folder
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - backend-network

  # 2. The Application (Logic Layer)
  app:
    build: .
    container_name: epicbook-app
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=8080
    depends_on:
      - db
    networks:
      - frontend-network
      - backend-network

  # 3. The Front Door (Proxy Layer)
  proxy:
    image: nginx:alpine
    container_name: epicbook-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - frontend-network

# Infrastructure Definitions
networks:
  frontend-network:
  backend-network:

volumes:
  db_data:
